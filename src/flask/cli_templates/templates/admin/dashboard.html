{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h1>Admin Dashboard</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">Users</h5>
                        <h2>{{ users_count }}</h2>
                        <a href="{{ url_for('admin.users') }}" class="text-white">View all users</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">Items</h5>
                        <h2>{{ items_count }}</h2>
                        <a href="{{ url_for('admin.items') }}" class="text-white">View all items</a>
                    </div>
                </div>
            </div>
        </div>
        
        <hr>
        
        <h2>Quick Actions</h2>
        <div class="btn-group" role="group">
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-primary">Manage Users</a>
            <a href="{{ url_for('admin.items') }}" class="btn btn-outline-success">Manage Items</a>
        </div>
    </div>
</div>
{% endblock %}
